name: Forest

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 128
  max_episode_length: 800

sim:
  enable_replicator: true

# ../viewer:
#   eye: [0., 8., 6.]

drone_model:
  name: Hummingbird
  controller: LeePositionController

time_encoding: true

lidar_range: 4.
lidar_vfov: [-10., 20.]
lidar_backend: isaaclab
simple_raycaster_mesh_prim_paths: ["/World/ground/terrain/mesh"]
simple_raycaster_simplify_factor: 0.5
simple_raycaster_mesh_poses_from_stage: true
simple_raycaster_mesh_count: 1
simple_raycaster_lidar_offset: [0.0, 0.0, 0.0]

action_transform: null

reward_effort_weight: 0.1
