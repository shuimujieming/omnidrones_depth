# Training config for depth camera environments
# Extends train.yaml with camera-specific settings

headless: true

sim: ${task.sim}
env: ${task.env}

# Training loop configuration
total_frames: 250_000_000
max_iters: -1
eval_interval: 200
save_interval: 200
seed: 0

# Video recording during evaluation
# Note: IsaacLab cameras require enable_cameras=True (set via CLI or automatically)
video: false

viewer:
  resolution: [960, 720]
  eye: [8, 0., 6.]
  lookat: [0., 0., 1.]

wandb:
  group: ${oc.select:..task.name}
  run_name: ${oc.select:..task.name,test}-${oc.select:..algo.name,none}
  job_type: train
  entity:
  project: omnidrones
  mode: online # set to 'disabled' when debugging locally
  run_id:
  monitor_gym: True
  tags:

hydra:
  searchpath:
    - file://../cfg

defaults:
  - task: ForestDepth
  - algo: ppo
  - _self_
